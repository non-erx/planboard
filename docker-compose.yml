services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - db-data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/planboard.db

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
